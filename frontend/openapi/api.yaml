openapi: 3.0.3

info:
  title: Kafka Lab API
  version: 0.1.0
  description: API for controlling and monitoring the Kafka lab demo.

servers:
  - url: http://localhost:8080

tags:
  - name: Producer
    description: Producer control endpoints
  - name: Consumer
    description: Consumer control endpoints
  - name: Dashboard
    description: Aggregated dashboard endpoints
paths:
  /api/producer/generations:
    post:
      tags:
        - Producer
      summary: Add messages to produce
      operationId: createProducerGeneration
      description: Adds a number of messages to the producer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProducerGenerationRequest'
            example:
              count: 100
              payloadSizeBytes: 1024
      responses:
        '202':
          description: Generation request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProducerStatusResponse'
              example:
                running: true
                targetCount: 100
                producedCount: 0
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/producer/status:
    get:
      tags:
        - Producer
      summary: Get producer status
      operationId: getProducerStatus
      description: Returns the current producer state.
      responses:
        '200':
          description: Producer status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProducerStatusResponse'
              example:
                running: true
                targetCount: 500
                producedCount: 320

  /api/consumer/pause:
    post:
      tags:
        - Consumer
      summary: Pause the consumer
      operationId: pauseConsumer
      description: Requests the Kafka consumer listener container to pause.
      responses:
        '200':
          description: Consumer pause requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerStatusResponse'
              example:
                running: false
                pauseRequested: true
                paused: true
                consumedCount: 320

  /api/consumer/resume:
    post:
      tags:
        - Consumer
      summary: Resume the consumer
      operationId: resumeConsumer
      description: Requests the Kafka consumer listener container to resume.
      responses:
        '200':
          description: Consumer resume requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerStatusResponse'
              example:
                running: true
                pauseRequested: false
                paused: false
                consumedCount: 320

  /api/consumer/status:
    get:
      tags:
        - Consumer
      summary: Get consumer status
      operationId: getConsumerStatus
      description: Returns the current state of the Kafka consumer listener container.
      responses:
        '200':
          description: Consumer status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerStatusResponse'
              example:
                running: true
                pauseRequested: false
                paused: false
                consumedCount: 1250

  /api/dashboard/status:
    get:
      tags:
        - Dashboard
      summary: Get aggregated dashboard status
      operationId: getDashboardStatus
      description: Returns producer status, consumer status, real Kafka lag and rates in a single response.
      responses:
        '200':
          description: Aggregated dashboard status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatusResponse'
              example:
                timestamp: "2026-04-01T16:20:31Z"
                topic: "kafka-lab-topic"
                consumerGroupId: "kafka-lab-consumer-group"
                producer:
                  running: true
                  targetCount: 5000
                  producedCount: 3210
                consumer:
                  running: false
                  pauseRequested: true
                  paused: true
                  consumedCount: 1180
                lag:
                  totalLag: 2030
                  partitions:
                    - partition: 0
                      committedOffset: 1180
                      endOffset: 3210
                      lag: 2030
                rates:
                  producedPerSecond: 250.0
                  consumedPerSecond: 0.0

components:
  schemas:

    ErrorCode:
      type: string
      enum:
        - INVALID_MESSAGE_COUNT
        - INVALID_PAYLOAD_SIZE
        - PAYLOAD_TOO_LARGE
        - VALIDATION_ERROR
      description: >
        INVALID_MESSAGE_COUNT   – count doit être > 0
        INVALID_PAYLOAD_SIZE    – payloadSizeBytes doit être > 0
        PAYLOAD_TOO_LARGE       – payloadSizeBytes dépasse Integer.MAX_VALUE
        VALIDATION_ERROR        - fallback générique pour tout champ non mappé

    ErrorResponse:
      type: object
      required: [code]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'

    ProducerGenerationRequest:
      type: object
      required:
        - count
        - payloadSizeBytes
      properties:
        count:
          type: integer
          format: int32
          minimum: 1
          description: Number of messages to add to the producer target messageCount.
          example: 100
        payloadSizeBytes:
          type: integer
          format: int32
          minimum: 1
          maximum: 1048576
          description: Size of each message payload in bytes.
          example: 1024

    ProducerStatusResponse:
      type: object
      required:
        - running
        - targetCount
        - producedCount
      properties:
        running:
          type: boolean
          description: True when the producer still has messages left to send.
          example: true
        targetCount:
          type: integer
          format: int64
          description: Total number of messages requested so far.
          example: 500
        producedCount:
          type: integer
          format: int64
          description: Total number of messages produced so far.
          example: 320

    ConsumerStatusResponse:
      type: object
      required:
        - running
        - pauseRequested
        - paused
        - consumedCount
      properties:
        running:
          type: boolean
          description: True when the consumer is actively allowed to consume messages.
          example: true
        pauseRequested:
          type: boolean
          description: True when a pause has been requested on the listener container.
          example: false
        paused:
          type: boolean
          description: True when the consumer is effectively paused.
          example: false
        consumedCount:
          type: integer
          format: int64
          description: Total number of consumed messages observed by the backend.
          example: 1250


    DashboardStatusResponse:
      type: object
      required:
        - timestamp
        - topic
        - consumerGroupId
        - producer
        - consumer
        - lag
        - rates
      properties:
        timestamp:
          type: string
          format: date-time
          description: Time at which the snapshot was computed.
          example: "2026-04-01T16:20:31Z"
        topic:
          type: string
          description: Kafka topic monitored by the dashboard.
          example: "kafka-lab-topic"
        consumerGroupId:
          type: string
          description: Kafka consumer group monitored by the dashboard.
          example: "kafka-lab-consumer-group"
        producer:
          $ref: '#/components/schemas/ProducerStatusResponse'
        consumer:
          $ref: '#/components/schemas/ConsumerStatusResponse'
        lag:
          $ref: '#/components/schemas/LagStatusResponse'
        rates:
          $ref: '#/components/schemas/RatesStatusResponse'

    LagStatusResponse:
      type: object
      required:
        - totalLag
        - partitions
      properties:
        totalLag:
          type: integer
          format: int64
          description: Sum of the lag across all partitions for the consumer group.
          example: 2030
        partitions:
          type: array
          description: Per-partition lag details.
          items:
            $ref: '#/components/schemas/PartitionLagResponse'

    PartitionLagResponse:
      type: object
      required:
        - partition
        - committedOffset
        - endOffset
        - lag
      properties:
        partition:
          type: integer
          format: int32
          description: Kafka partition id.
          example: 0
        committedOffset:
          type: integer
          format: int64
          description: Last committed offset for the consumer group on this partition.
          example: 1180
        endOffset:
          type: integer
          format: int64
          description: Current log end offset for this partition.
          example: 3210
        lag:
          type: integer
          format: int64
          description: Difference between end offset and committed offset.
          example: 2030

    RatesStatusResponse:
      type: object
      required:
        - producedPerSecond
        - consumedPerSecond
      properties:
        producedPerSecond:
          type: number
          format: double
          description: Estimated producer throughput over the recent sampling window.
          example: 250.0
        consumedPerSecond:
          type: number
          format: double
          description: Estimated consumer throughput over the recent sampling window.
          example: 0.0